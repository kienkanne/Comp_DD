common:
  project_name: MD_Dialanine

  working_dir: /localscratch/kbui/NexusMol/examples/artifacts
  results_dir: /localscratch/kbui/NexusMol/examples/results

  # You can also use output files from sysmd in examples/results/6W63_mol4_solvated
  # The input here is dialanine, which is a much smaller system for illustration purposes
  prmtop: /localscratch/kbui/NexusMol/examples/md_input/ALA.prmtop
  inpcrd: /localscratch/kbui/NexusMol/examples/md_input/ALA.inpcrd

  temp: 300.0
  dt: 0.002
  cut: 10.0

  # Dialnine is "ACE-ALA-NME", which has 3 residues
  # If you decide to use examples/results/6W63_mol4_solvated, the mask is ":1-610"
  mask: ":1-3"

min:
  n_min_runs: 7
  ncyc: 1000
  maxcyc: 1000
  restraints: [10.0, 5.0, 2.0, 1.0, 0.5, 0.1, 0.0]

heat:
  mid_temp: 100.0
  time1: 100.0
  time2: 500.0
  total_time: 2000.0
  restraint: 10.0

eq:
  n_eq_runs: 7
  eq_time: 100.0
  restraints: [10.0, 5.0, 2.0, 1.0, 0.5, 0.1, 0.0]

prod:
  num_seeds: 1
  rand_time: 200.0
  prod_time: 2500.0
  prod_freq: 10.0
